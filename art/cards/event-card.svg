<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" role="img" aria-labelledby="event-card-svg-title event-card-svg-desc">
  <title id="event-card-svg-title">Event card frame — Imperium: Twilight of Empires</title>
  <desc id="event-card-svg-desc">Card frame template: aged parchment field, Greek-key border, imperial porphyry title ribbon with gold trim, vellum art window with tesserae corners, body text area, and an omen-eye emblem in the footer.</desc>

  <!-- ==================== DEFS ==================== -->
  <defs>
    <!-- Greek-key (meander) unit: one 12x10 tile of the border band -->
    <path id="event-card-key-unit" d="M1.5 8.5 V1.5 H10.5 V8.5 H4.5 V4.5 H7.5"
          fill="none" stroke="#2B2118" stroke-width="1.3"/>
    <pattern id="event-card-key-pattern" width="12" height="10" patternUnits="userSpaceOnUse">
      <use href="#event-card-key-unit"/>
    </pattern>

    <!-- Laurel leaf, reused by the art-window sprig (and wreath emblem where present) -->
    <path id="event-card-leaf" d="M0 0 Q3.2 -2.6 6.4 0 Q3.2 2.6 0 0 Z"/>

    <!-- Laurel sprig: placeholder motif for the art window; colored via currentColor -->
    <g id="event-card-sprig">
      <path d="M0 46 C-7 18 -5 -12 9 -44" fill="none" stroke="currentColor"
            stroke-width="3" stroke-linecap="round"/>
      <g fill="currentColor">
        <use href="#event-card-leaf" transform="translate(-2.6 33) rotate(-150) scale(2.2)"/>
        <use href="#event-card-leaf" transform="translate(-4 21) rotate(-32) scale(2.3)"/>
        <use href="#event-card-leaf" transform="translate(-4.8 9) rotate(-152) scale(2.4)"/>
        <use href="#event-card-leaf" transform="translate(-4 -3) rotate(-30) scale(2.4)"/>
        <use href="#event-card-leaf" transform="translate(-2 -15) rotate(-148) scale(2.3)"/>
        <use href="#event-card-leaf" transform="translate(1.2 -26) rotate(-28) scale(2.2)"/>
        <use href="#event-card-leaf" transform="translate(4.8 -36) rotate(-140) scale(2)"/>
        <use href="#event-card-leaf" transform="translate(8 -44) rotate(-75) scale(2)"/>
      </g>
      <g fill="currentColor">
        <circle cx="-3.6" cy="27" r="1.7"/>
        <circle cx="-4.6" cy="3" r="1.7"/>
        <circle cx="-0.6" cy="-21" r="1.7"/>
      </g>
    </g>

    <!-- Mosaic tesserae cluster (2x2 with grout gaps), centered on origin -->
    <g id="event-card-tessera" stroke="#2B2118" stroke-width="0.6">
      <rect x="-4.8" y="-4.8" width="4.5" height="4.5" fill="#C9A227"/>
      <rect x="0.3" y="-4.8" width="4.5" height="4.5" fill="#4B1F3F"/>
      <rect x="-4.8" y="0.3" width="4.5" height="4.5" fill="#4B1F3F"/>
      <rect x="0.3" y="0.3" width="4.5" height="4.5" fill="#C9A227"/>
    </g>

    <!-- footer emblem: omen eye -->
    <g id="event-card-emblem">
      <g stroke="#4B1F3F" stroke-width="1.6" stroke-linecap="round">
        <path d="M0 -12.4 V-9.4"/>
        <path d="M-7.6 -10.2 L-5.9 -7.6"/>
        <path d="M7.6 -10.2 L5.9 -7.6"/>
      </g>
      <path d="M-12 0 Q0 -8.8 12 0 Q0 8.8 -12 0 Z" fill="#FFFFFF" stroke="#4B1F3F"
            stroke-width="1.8" stroke-linejoin="round"/>
      <circle r="4.6" fill="#4B1F3F" stroke="#C9A227" stroke-width="1.6"/>
      <circle r="1.9" fill="#2B2118"/>
      <circle cx="-1.5" cy="-1.6" r="0.9" fill="#FFFFFF"/>
      <path d="M0 8.8 V11.6" stroke="#4B1F3F" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <clipPath id="event-card-art-clip">
      <rect x="30" y="70" width="240" height="140"/>
    </clipPath>
  </defs>

  <!-- ==================== PARCHMENT FIELD ==================== -->
  <rect x="0" y="0" width="300" height="420" rx="8" fill="#F0E6D2"/>
  <!-- subtle aging mottle -->
  <g fill="#E2D3B3">
    <path d="M56 292 q26 -16 60 -6 q30 9 18 27 q-19 23 -54 13 q-35 -11 -24 -34 Z" opacity="0.26"/>
    <path d="M182 246 q34 -12 58 4 q20 14 2 28 q-26 18 -54 6 q-27 -12 -6 -38 Z" opacity="0.22"/>
    <path d="M112 336 q22 -14 48 -4 q24 9 12 24 q-16 19 -44 10 q-29 -10 -16 -30 Z" opacity="0.2"/>
  </g>
  <g fill="#2B2118" opacity="0.07">
    <circle cx="66" cy="240" r="0.9"/>
    <circle cx="238" cy="308" r="0.7"/>
    <circle cx="204" cy="356" r="0.8"/>
    <circle cx="96" cy="262" r="0.6"/>
    <circle cx="252" cy="224" r="0.7"/>
  </g>
  <!-- ink outer keyline -->
  <rect x="2" y="2" width="296" height="416" rx="7" fill="none" stroke="#2B2118" stroke-width="1.6"/>
  <rect x="5" y="5" width="290" height="410" rx="5.5" fill="none" stroke="#2B2118"
        stroke-width="0.7" stroke-opacity="0.65"/>

  <!-- ==================== GREEK-KEY BORDER BAND ==================== -->
  <!-- vellum underlay for the band, inset 8, band width 10 -->
  <path d="M8 8 H292 V412 H8 Z M18 18 V402 H282 V18 Z" fill="#E2D3B3" fill-rule="evenodd"/>
  <!-- meander runs: top, bottom, left, right (keys rooted on the outer edge) -->
  <g transform="translate(18 8)"><rect width="264" height="10" fill="url(#event-card-key-pattern)"/></g>
  <g transform="translate(282 412) rotate(180)"><rect width="264" height="10" fill="url(#event-card-key-pattern)"/></g>
  <g transform="translate(8 402) rotate(-90)"><rect width="384" height="10" fill="url(#event-card-key-pattern)"/></g>
  <g transform="translate(292 18) rotate(90)"><rect width="384" height="10" fill="url(#event-card-key-pattern)"/></g>
  <!-- band hairlines -->
  <rect x="8" y="8" width="284" height="404" fill="none" stroke="#2B2118" stroke-width="0.8"/>
  <rect x="18" y="18" width="264" height="384" fill="none" stroke="#2B2118" stroke-width="0.8"/>
  <!-- tesserae at the four band corners -->
  <use href="#event-card-tessera" transform="translate(13 13)"/>
  <use href="#event-card-tessera" transform="translate(287 13)"/>
  <use href="#event-card-tessera" transform="translate(13 407)"/>
  <use href="#event-card-tessera" transform="translate(287 407)"/>

  <!-- ==================== TITLE BANNER ==================== -->
  <g>
    <!-- ribbon tails (shadowed, behind the banner) -->
    <g stroke="#2B2118" stroke-width="1" stroke-linejoin="round">
      <path d="M50 29.5 L20 32.5 L27 41 L20 49.5 L50 52.5 Z" fill="#4B1F3F"/>
      <path d="M250 29.5 L280 32.5 L273 41 L280 49.5 L250 52.5 Z" fill="#4B1F3F"/>
    </g>
    <path d="M50 29.5 L20 32.5 L27 41 L20 49.5 L50 52.5 Z" fill="#2B2118" opacity="0.3"/>
    <path d="M250 29.5 L280 32.5 L273 41 L280 49.5 L250 52.5 Z" fill="#2B2118" opacity="0.3"/>
    <!-- main ribbon with gold trim -->
    <path d="M38 26 C86 22.5 214 22.5 262 26 L262 56 C214 59.5 86 59.5 38 56 Z"
          fill="#4B1F3F" stroke="#2B2118" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M42 29.2 C88 26 212 26 258 29.2 L258 52.8 C212 56 88 56 42 52.8 Z"
          fill="none" stroke="#C9A227" stroke-width="1.2"/>
    <text id="event-card-title-slot" x="150" y="46.5" font-family="Cinzel, serif" font-weight="700"
          font-size="16" letter-spacing="2" fill="#F0E6D2" text-anchor="middle">TITLE</text>
  </g>

  <!-- ==================== ART WINDOW ==================== -->
  <!-- art window -->
  <g>
    <rect x="30" y="70" width="240" height="140" fill="#E2D3B3"/>
    <!-- faint placeholder motif: crossed laurel sprigs -->
    <g clip-path="url(#event-card-art-clip)" color="#2B2118" opacity="0.09">
      <use href="#event-card-sprig" transform="translate(132 154) rotate(-24) scale(1.15)"/>
      <use href="#event-card-sprig" transform="translate(168 154) scale(-1.15 1.15) rotate(-24)"/>
    </g>
    <!-- gold frame with ink hairlines -->
    <rect x="27.5" y="67.5" width="245" height="145" fill="none" stroke="#2B2118" stroke-width="0.8"/>
    <rect x="30" y="70" width="240" height="140" fill="none" stroke="#C9A227" stroke-width="2.4"/>
    <rect x="32.5" y="72.5" width="235" height="135" fill="none" stroke="#2B2118"
          stroke-width="0.7" stroke-opacity="0.55"/>
    <!-- mosaic-tesserae corner accents -->
    <use href="#event-card-tessera" transform="translate(30 70)"/>
    <use href="#event-card-tessera" transform="translate(270 70)"/>
    <use href="#event-card-tessera" transform="translate(30 210)"/>
    <use href="#event-card-tessera" transform="translate(270 210)"/>
  </g>

  <!-- ==================== BODY TEXT AREA ==================== -->
  <g>
    <!-- hairline vellum rule with gold divider gem -->
    <line x1="30" y1="225" x2="270" y2="225" stroke="#E2D3B3" stroke-width="2"/>
    <path d="M150 221.5 L153.5 225 L150 228.5 L146.5 225 Z" fill="#C9A227"
          stroke="#2B2118" stroke-width="0.5"/>
    <g font-family="EB Garamond, serif" font-size="13" fill="#2B2118" text-anchor="middle">
      <text id="event-card-body-slot-1" x="150" y="250">Body text line 1</text>
      <text id="event-card-body-slot-2" x="150" y="274">Body text line 2</text>
      <text id="event-card-body-slot-3" x="150" y="298">Body text line 3</text>
      <text id="event-card-body-slot-4" x="150" y="322">Body text line 4</text>
    </g>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <g>
    <path d="M84 376 L86.6 378.6 L84 381.2 L81.4 378.6 Z" fill="#4B1F3F"/>
    <path d="M216 376 L218.6 378.6 L216 381.2 L213.4 378.6 Z" fill="#4B1F3F"/>
    <text id="event-card-type-slot" x="150" y="382" font-family="Cinzel, serif" font-weight="700"
          font-size="10.5" letter-spacing="3" fill="#4B1F3F" text-anchor="middle">EVENT</text>
    <use href="#event-card-emblem" transform="translate(150 392.8) scale(0.62)"/>
  </g>
</svg>
