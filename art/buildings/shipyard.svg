<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" id="shipyard-building" role="img" aria-labelledby="shipyard-title">
  <title id="shipyard-title">Shipyard — hull on a slipway cradle with hammer</title>

  <!-- ============================================================
       IMPERIUM: Twilight of Empires — building icon: SHIPYARD
       Galley hull under construction: crescent hull with raised
       stem propped on two splayed cradle struts over the slipway
       sill; a shipwright's maul leans against the sheer strake.
       currentColor silhouette only.
       ============================================================ -->

  <!-- == shipwright's maul raised above the sheer strake == -->
  <g fill="currentColor" transform="translate(12.5 9) rotate(-35)">
    <rect x="-4.5" y="-4" width="9" height="3.6" rx="1"/>
    <rect x="-1.3" y="-1.5" width="2.6" height="9.5" rx="1.2"/>
  </g>

  <!-- == hull: flat sheer line, tall raised stem at the bow (rise
       exaggerated so the crescent-hull silhouette reads at small
       sizes), deep belly curve == -->
  <path fill="currentColor" d="
    M5.5 16 L35.5 16 L42.8 5.5 L44.8 8.4 L40 19
    Q36 25.5 26 26.8 Q12 27.5 5.5 16 Z"/>

  <!-- == cradle struts, splayed, rooted in the slipway sill == -->
  <g fill="currentColor">
    <path d="M9.5 21 L13.5 21 L15 40.5 L7 40.5 Z"/>
    <path d="M31 22.5 L35 22.5 L38 40.5 L28.5 40.5 Z"/>
  </g>

  <!-- == slipway sill == -->
  <rect fill="currentColor" x="4" y="39" width="40" height="3.8" rx="1.5"/>
</svg>
