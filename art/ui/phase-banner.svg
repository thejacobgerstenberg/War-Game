<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 90" role="img" aria-labelledby="phase-banner-svg-title phase-banner-svg-desc">
  <title id="phase-banner-svg-title">Phase banner — Imperium: Twilight of Empires</title>
  <desc id="phase-banner-svg-desc">Hanging porphyry war-banner with forked swallow-tail ends, suspended by gold cords from a gold rod, trimmed in gold with a fringe along the bottom and a centered Cinzel phase title.</desc>

  <!-- ==================== DEFS ==================== -->
  <defs>
    <!-- fringe thread: one 8x9 tile -->
    <pattern id="phase-banner-fringe-pattern" width="8" height="9" patternUnits="userSpaceOnUse">
      <path d="M4 0 V7" stroke="#C9A227" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="4" cy="7.6" r="1" fill="#C9A227"/>
    </pattern>
  </defs>

  <!-- ==================== HANGING ROD ==================== -->
  <rect x="10" y="6" width="580" height="5" rx="2.5" fill="#C9A227" stroke="#2B2118" stroke-width="1"/>
  <rect x="12" y="7" width="576" height="1.4" fill="#FFFFFF" opacity="0.35"/>
  <circle cx="9" cy="8.5" r="4.5" fill="#C9A227" stroke="#2B2118" stroke-width="1"/>
  <circle cx="591" cy="8.5" r="4.5" fill="#C9A227" stroke="#2B2118" stroke-width="1"/>

  <!-- ==================== CORDS AND RINGS ==================== -->
  <g stroke="#C9A227" stroke-width="2" stroke-linecap="round">
    <path d="M80 14 V23"/>
    <path d="M190 14 V23"/>
    <path d="M300 14 V23"/>
    <path d="M410 14 V23"/>
    <path d="M520 14 V23"/>
  </g>
  <g fill="none" stroke="#C9A227" stroke-width="1.6">
    <circle cx="80" cy="11.5" r="2.6"/>
    <circle cx="190" cy="11.5" r="2.6"/>
    <circle cx="300" cy="11.5" r="2.6"/>
    <circle cx="410" cy="11.5" r="2.6"/>
    <circle cx="520" cy="11.5" r="2.6"/>
  </g>

  <!-- ==================== BANNER CLOTH (forked swallow-tail ends) ==================== -->
  <path d="M24 22 H576 L548 47 L576 72 H24 L52 47 Z"
        fill="#4B1F3F" stroke="#2B2118" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- cloth shading: top light, bottom shade, gentle fold shadows -->
  <rect x="34" y="24.5" width="532" height="4" fill="#FFFFFF" opacity="0.12"/>
  <rect x="58" y="64" width="484" height="6" fill="#2B2118" opacity="0.18"/>
  <g fill="#2B2118" opacity="0.09">
    <path d="M142 24 L150 24 L146 70 L138 70 Z"/>
    <path d="M452 24 L460 24 L456 70 L448 70 Z"/>
  </g>
  <g fill="#FFFFFF" opacity="0.05">
    <path d="M152 24 L158 24 L154 70 L148 70 Z"/>
    <path d="M442 24 L448 24 L444 70 L438 70 Z"/>
  </g>
  <!-- gold trim following the cloth -->
  <path d="M31 26.5 H569 L544 47 L569 67.5 H31 L56 47 Z"
        fill="none" stroke="#C9A227" stroke-width="1.3" stroke-opacity="0.95" stroke-linejoin="round"/>

  <!-- ==================== GOLD FRINGE (bottom edge between the tails) ==================== -->
  <rect x="64" y="72" width="472" height="9" fill="url(#phase-banner-fringe-pattern)"/>
  <!-- tail tassels -->
  <g stroke="#C9A227" stroke-width="1.8" stroke-linecap="round">
    <path d="M24 73 V79"/>
    <path d="M576 73 V79"/>
  </g>
  <circle cx="24" cy="80.5" r="1.6" fill="#C9A227"/>
  <circle cx="576" cy="80.5" r="1.6" fill="#C9A227"/>

  <!-- ==================== TITLE ==================== -->
  <text id="phase-banner-title-slot" x="300" y="55" font-family="Cinzel, serif" font-weight="700"
        font-size="24" letter-spacing="6" fill="#F0E6D2" text-anchor="middle">OMENS</text>
</svg>
