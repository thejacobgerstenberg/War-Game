<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-labelledby="button-hover-svg-title button-hover-svg-desc">
  <title id="button-hover-svg-title">Button, hover state — Imperium: Twilight of Empires</title>
  <desc id="button-hover-svg-desc">Rounded button on a vellum field with a soft gold outer glow, brightened gold keyline, Greek-key end caps in gold, and a centered Cinzel label in ink. Hover state.</desc>

  <!-- ==================== DEFS ==================== -->
  <defs>
    <!-- Greek-key end cap: open meander spiral in an 18x14 box, centered on origin -->
    <path id="button-hover-key-cap" d="M-9 7 V-7 H9 V7 H-3 V-3 H3"
          fill="none" stroke-width="1.4" stroke-linejoin="miter"/>
    <!-- soft gold halo (kept inside the 3px margin so the blur fades out before the viewBox edge) -->
    <filter id="button-hover-glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- ==================== GOLD OUTER GLOW ==================== -->
  <rect x="5" y="5" width="230" height="54" rx="11" fill="none" stroke="#C9A227"
        stroke-width="4" stroke-opacity="0.8" filter="url(#button-hover-glow)"/>

  <!-- ==================== FIELD + KEYLINES (shared geometry across all states) ==================== -->
  <rect x="3" y="3" width="234" height="58" rx="13" fill="#E2D3B3" stroke="#2B2118" stroke-width="1.6"/>
  <rect x="7" y="7" width="226" height="50" rx="9" fill="none" stroke="#C9A227" stroke-width="1.6" stroke-opacity="1"/>

  <!-- ==================== BEVEL (raised: highlight top, shadow bottom) ==================== -->
  <rect x="10" y="9" width="220" height="8" rx="6" fill="#FFFFFF" opacity="0.45"/>
  <rect x="10" y="47" width="220" height="8" rx="6" fill="#2B2118" opacity="0.11"/>

  <!-- ==================== GREEK-KEY END CAPS ==================== -->
  <use href="#button-hover-key-cap" transform="translate(27 32)" stroke="#C9A227" stroke-opacity="1"/>
  <use href="#button-hover-key-cap" transform="translate(213 32) rotate(180)" stroke="#C9A227" stroke-opacity="1"/>

  <!-- ==================== LABEL ==================== -->
  <text id="button-hover-label-slot" x="120" y="39" font-family="Cinzel, serif" font-weight="700"
        font-size="19" letter-spacing="3" fill="#2B2118" text-anchor="middle">ACTION</text>
</svg>
