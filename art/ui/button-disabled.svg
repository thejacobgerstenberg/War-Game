<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-labelledby="button-disabled-svg-title button-disabled-svg-desc">
  <title id="button-disabled-svg-title">Button, disabled state — Imperium: Twilight of Empires</title>
  <desc id="button-disabled-svg-desc">Rounded button with a faded 0.45-opacity parchment field, silver keylines and Greek-key end caps, and a centered Cinzel label in silver. Disabled state.</desc>

  <!-- ==================== DEFS ==================== -->
  <defs>
    <!-- Greek-key end cap: open meander spiral in an 18x14 box, centered on origin -->
    <path id="button-disabled-key-cap" d="M-9 7 V-7 H9 V7 H-3 V-3 H3"
          fill="none" stroke-width="1.4" stroke-linejoin="miter"/>
  </defs>

  <!-- ==================== FIELD + KEYLINES (shared geometry across all states; silver trim) ==================== -->
  <rect x="3" y="3" width="234" height="58" rx="13" fill="#F0E6D2" fill-opacity="0.45"
        stroke="#C9CDD4" stroke-width="1.6"/>
  <rect x="7" y="7" width="226" height="50" rx="9" fill="none" stroke="#C9CDD4" stroke-width="1.6" stroke-opacity="0.85"/>

  <!-- ==================== GREEK-KEY END CAPS ==================== -->
  <use href="#button-disabled-key-cap" transform="translate(27 32)" stroke="#C9CDD4" stroke-opacity="0.9"/>
  <use href="#button-disabled-key-cap" transform="translate(213 32) rotate(180)" stroke="#C9CDD4" stroke-opacity="0.9"/>

  <!-- ==================== LABEL ==================== -->
  <text id="button-disabled-label-slot" x="120" y="39" font-family="Cinzel, serif" font-weight="700"
        font-size="19" letter-spacing="3" fill="#C9CDD4" text-anchor="middle">ACTION</text>
</svg>
