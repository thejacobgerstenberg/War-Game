<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="modal-frame-svg-title modal-frame-svg-desc">
  <title id="modal-frame-svg-title">Modal frame — Imperium: Twilight of Empires</title>
  <desc id="modal-frame-svg-desc">Grand dialog chrome: parchment field with ink and gold keylines, an imperial porphyry header band with gold trim, laurel sprigs flanking a Cinzel title slot, and a Greek-key inner border around the body area.</desc>

  <!-- ==================== DEFS ==================== -->
  <defs>
    <!-- Greek-key (meander) unit: one 12x10 tile of the border band -->
    <path id="modal-frame-key-unit" d="M1.5 8.5 V1.5 H10.5 V8.5 H4.5 V4.5 H7.5"
          fill="none" stroke="#2B2118" stroke-width="1.3"/>
    <pattern id="modal-frame-key-pattern" width="12" height="10" patternUnits="userSpaceOnUse">
      <use href="#modal-frame-key-unit"/>
    </pattern>
    <!-- laurel leaf for the header sprigs -->
    <path id="modal-frame-leaf" d="M0 0 Q3.2 -2.6 6.4 0 Q3.2 2.6 0 0 Z"/>
    <!-- horizontal laurel sprig pointing right, colored via currentColor -->
    <g id="modal-frame-sprig">
      <path d="M-30 6 C-12 8 12 6 30 -4" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round"/>
      <g fill="currentColor">
        <use href="#modal-frame-leaf" transform="translate(-24 5.4) rotate(-64) scale(1.7)"/>
        <use href="#modal-frame-leaf" transform="translate(-14 6.6) rotate(48) scale(1.8)"/>
        <use href="#modal-frame-leaf" transform="translate(-4 6.4) rotate(-62) scale(1.9)"/>
        <use href="#modal-frame-leaf" transform="translate(6 5.4) rotate(46) scale(1.9)"/>
        <use href="#modal-frame-leaf" transform="translate(15 3.4) rotate(-66) scale(1.8)"/>
        <use href="#modal-frame-leaf" transform="translate(23 0.6) rotate(40) scale(1.7)"/>
        <use href="#modal-frame-leaf" transform="translate(29 -3) rotate(-15) scale(1.6)"/>
      </g>
      <g fill="currentColor">
        <circle cx="-19" cy="6.4" r="1.3"/>
        <circle cx="1" cy="6.6" r="1.3"/>
        <circle cx="19.5" cy="2.2" r="1.3"/>
      </g>
    </g>
    <!-- mosaic tesserae cluster for the key-band corners -->
    <g id="modal-frame-tessera" stroke="#2B2118" stroke-width="0.6">
      <rect x="-4.8" y="-4.8" width="4.5" height="4.5" fill="#C9A227"/>
      <rect x="0.3" y="-4.8" width="4.5" height="4.5" fill="#4B1F3F"/>
      <rect x="-4.8" y="0.3" width="4.5" height="4.5" fill="#4B1F3F"/>
      <rect x="0.3" y="0.3" width="4.5" height="4.5" fill="#C9A227"/>
    </g>
  </defs>

  <!-- ==================== PARCHMENT FIELD + OUTER KEYLINES ==================== -->
  <rect x="0" y="0" width="480" height="360" rx="10" fill="#F0E6D2"/>
  <rect x="2" y="2" width="476" height="356" rx="9" fill="none" stroke="#2B2118" stroke-width="1.6"/>
  <rect x="6" y="6" width="468" height="348" rx="7" fill="none" stroke="#C9A227" stroke-width="1.4" stroke-opacity="0.95"/>

  <!-- ==================== AGING MOTTLE (body) ==================== -->
  <g fill="#E2D3B3">
    <path d="M84 268 q30 -18 68 -7 q34 10 20 30 q-21 26 -61 15 q-40 -12 -27 -38 Z" opacity="0.24"/>
    <path d="M296 216 q38 -13 66 5 q22 15 2 31 q-29 20 -61 7 q-30 -14 -7 -43 Z" opacity="0.2"/>
    <path d="M180 300 q25 -16 54 -5 q27 10 13 27 q-18 21 -49 11 q-33 -11 -18 -33 Z" opacity="0.18"/>
  </g>
  <g fill="#2B2118" opacity="0.06">
    <circle cx="96" cy="216" r="0.9"/>
    <circle cx="360" cy="292" r="0.8"/>
    <circle cx="300" cy="330" r="0.7"/>
    <circle cx="150" cy="250" r="0.6"/>
    <circle cx="404" cy="200" r="0.7"/>
    <circle cx="220" cy="180" r="0.6"/>
  </g>

  <!-- ==================== PORPHYRY HEADER BAND ==================== -->
  <rect x="10" y="10" width="460" height="56" rx="5" fill="#4B1F3F" stroke="#2B2118" stroke-width="1.3"/>
  <!-- header sheen and floor shadow -->
  <rect x="12" y="12" width="456" height="10" rx="4" fill="#FFFFFF" opacity="0.08"/>
  <rect x="12" y="56" width="456" height="8" rx="4" fill="#2B2118" opacity="0.22"/>
  <!-- gold trim -->
  <rect x="14" y="14" width="452" height="48" rx="3.5" fill="none" stroke="#C9A227" stroke-width="1.3"/>
  <!-- laurel sprigs flanking the title -->
  <g color="#C9A227">
    <use href="#modal-frame-sprig" transform="translate(92 38)"/>
    <use href="#modal-frame-sprig" transform="translate(388 38) scale(-1 1)"/>
  </g>
  <!-- title slot -->
  <text id="modal-frame-title-slot" x="240" y="45.5" font-family="Cinzel, serif" font-weight="700"
        font-size="22" letter-spacing="4" fill="#F0E6D2" text-anchor="middle">COUNCIL</text>

  <!-- ==================== GREEK-KEY INNER BORDER (body area) ==================== -->
  <!-- vellum underlay for the band, outer rect (20,80)-(460,340), band width 10 -->
  <path d="M20 80 H460 V340 H20 Z M30 90 V330 H450 V90 Z" fill="#E2D3B3" fill-rule="evenodd"/>
  <!-- meander runs: top, bottom, left, right (420 = 35 tiles, 240 = 20 tiles) -->
  <g transform="translate(30 80)"><rect width="420" height="10" fill="url(#modal-frame-key-pattern)"/></g>
  <g transform="translate(450 340) rotate(180)"><rect width="420" height="10" fill="url(#modal-frame-key-pattern)"/></g>
  <g transform="translate(20 330) rotate(-90)"><rect width="240" height="10" fill="url(#modal-frame-key-pattern)"/></g>
  <g transform="translate(460 90) rotate(90)"><rect width="240" height="10" fill="url(#modal-frame-key-pattern)"/></g>
  <!-- band hairlines -->
  <rect x="20" y="80" width="440" height="260" fill="none" stroke="#2B2118" stroke-width="0.8"/>
  <rect x="30" y="90" width="420" height="240" fill="none" stroke="#2B2118" stroke-width="0.8"/>
  <!-- tesserae at the four band corners -->
  <use href="#modal-frame-tessera" transform="translate(25 85)"/>
  <use href="#modal-frame-tessera" transform="translate(455 85)"/>
  <use href="#modal-frame-tessera" transform="translate(25 335)"/>
  <use href="#modal-frame-tessera" transform="translate(455 335)"/>
</svg>
