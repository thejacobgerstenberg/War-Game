<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="mercenary-token" role="img" aria-labelledby="mercenary-token-title">
  <title id="mercenary-token-title">Mercenary — halberdier with plumed hat and coin pouch</title>

  <!-- ============================================================
       IMPERIUM: Twilight of Empires — unit token: MERCENARY
       Free companion at right, halberd at left. 28px identifiers:
       the axe-bladed halberd head, the wide plumed hat sweeping
       right, and the coin pouch bulging at the belt. Belt itself
       is a negative-space gap between doublet and skirt.
       currentColor only.
       ============================================================ -->

  <g fill="currentColor">
    <!-- == halberd: shaft, top spike, axe blade, rear fluke == -->
    <rect x="15.2" y="8" width="3.6" height="49" rx="1.8"/>
    <path d="M15.2 9.5 L17 4 L18.8 9.5 Z"/>
    <path d="M18.8 10.5 L27.5 12 Q29.4 17.5 27 23.5 Q22.5 24 18.8 22.5 Z"/>
    <path d="M15.2 13 Q9.5 14 9 19.5 Q12.5 19.5 15.2 17.5 Z"/>

    <!-- == plumed hat: wide brim, crown, feather sweeping right == -->
    <rect x="32" y="13" width="18" height="3.4" rx="1.7"/>
    <path d="M36.5 13.5 Q41 6.5 45.5 13.5 Z"/>
    <path d="M43 9 Q49 1.5 56 5.5 Q51.5 9.5 45.5 11.5 Q43.5 10.5 43 9 Z"/>

    <!-- == head and neck == -->
    <circle cx="41" cy="20" r="4.6"/>
    <rect x="39.2" y="22.5" width="3.6" height="5"/>

    <!-- == doublet above the belt gap == -->
    <path d="M35 27 L47 27 L48.1 36 L34.2 36 Z"/>

    <!-- == skirt below the belt gap, flaring to the hem == -->
    <path d="M34 38.4 L48.3 38.4 L49 43 L33.5 43 Z"/>

    <!-- == coin pouch tied at the right hip == -->
    <rect x="48.4" y="35.5" width="3.4" height="4.5" rx="1.2" transform="rotate(18 50.1 37.7)"/>
    <circle cx="51" cy="42.5" r="4.3"/>

    <!-- == arm gripping the halberd shaft == -->
    <rect x="16" y="28.5" width="20" height="3.6" rx="1.8"/>

    <!-- == legs == -->
    <rect x="36" y="43" width="4" height="14" rx="1.5"/>
    <rect x="44" y="43" width="4" height="14" rx="1.5"/>
  </g>
</svg>
