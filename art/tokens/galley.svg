<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="galley-token" role="img" aria-labelledby="galley-token-title">
  <title id="galley-token-title">Galley — single-masted oared galley, lateen sail furled</title>

  <!-- ============================================================
       IMPERIUM: Twilight of Empires — unit token: GALLEY
       Light galley in profile, bow to the right: crescent hull
       with plain upswept ends (no ram — that is the war galley's
       mark), single mast, and the lateen yard carried with the
       sail FURLED — a thick tapered bundle under the spar instead
       of a set sail. Three oars. currentColor only.
       ============================================================ -->

  <g fill="currentColor">
    <!-- == lateen yard: raked spar, low end aft-left == -->
    <rect x="8" y="17.3" width="48" height="3.4" rx="1.7"
          transform="rotate(-23 32 19)"/>

    <!-- == furled sail: tapered bundle sagging under the yard == -->
    <path d="M11.5 28.2 L51.5 11 Q37 26.8 11.5 28.2 Z"/>

    <!-- == mast from above the yard down into the hull == -->
    <rect x="29.4" y="8" width="3.6" height="36"/>

    <!-- == hull: crescent, both ends swept up, no ram beak == -->
    <path d="M5.5 32.5
             Q8 42.5 18 44
             L45 44
             Q55 42.5 58.5 32.5
             Q59.5 39.5 54.5 45.5
             Q46 52 30.5 52
             Q13.5 51.5 7 43
             Q4.8 38.5 5.5 32.5 Z"/>

    <!-- == three oars trailing sternward == -->
    <rect x="-1.7" y="0" width="3.4" height="9.5" transform="translate(20 49.5) rotate(20)"/>
    <rect x="-1.7" y="0" width="3.4" height="9.5" transform="translate(29.5 50) rotate(20)"/>
    <rect x="-1.7" y="0" width="3.4" height="9.5" transform="translate(39 49.5) rotate(20)"/>
  </g>
</svg>
