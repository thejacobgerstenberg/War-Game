<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="faith-icon" role="img" aria-labelledby="faith-title">
  <title id="faith-title">Faith — Chi-Rho monogram</title>

  <!-- ============================================================
       IMPERIUM: Twilight of Empires — action icon: FAITH
       Chi-Rho monogram (staurogram of Constantine): tall rho stem
       with looped bowl, chi saltire crossing below. All strokes
       drawn as flared-terminal paths (manuscript feel), pure
       currentColor silhouette; bowl counter is evenodd cut-out.
       ============================================================ -->

  <defs>
    <!-- == one chi stroke: horizontal bar, concave flared ends == -->
    <path id="faith-chi-bar" fill="currentColor" d="
      M-26 -5.2 Q-15 -3.3 0 -3.3 Q15 -3.3 26 -5.2
      L26 5.2 Q15 3.3 0 3.3 Q-15 3.3 -26 5.2 Z"/>
  </defs>

  <!-- == chi (X): two bars crossed at (32,38) == -->
  <use href="#faith-chi-bar" transform="translate(32 38) rotate(45)"/>
  <use href="#faith-chi-bar" transform="translate(32 38) rotate(-45)"/>

  <!-- == rho stem: vertical bar, flared head and foot == -->
  <path fill="currentColor" transform="translate(32 31)" d="
    M-5.2 -26 Q-3.3 -15 -3.3 0 Q-3.3 15 -5.2 26
    L5.2 26 Q3.3 15 3.3 0 Q3.3 -15 5.2 -26 Z"/>

  <!-- == rho bowl: solid loop off the stem head, cut-out counter
       biased right so the join to the stem stays thick == -->
  <path fill="currentColor" fill-rule="evenodd" d="
    M28.5 15 A9 9 0 1 0 46.5 15 A9 9 0 1 0 28.5 15 Z
    M36 15 A4.2 4.2 0 1 0 44.4 15 A4.2 4.2 0 1 0 36 15 Z"/>
</svg>
