<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="siege-icon" role="img" aria-labelledby="siege-title">
  <title id="siege-title">Siege — counterweight trebuchet in profile</title>

  <!-- ============================================================
       IMPERIUM: Twilight of Empires — action icon: SIEGE
       Trebuchet in profile, cocked: A-frame on a ground beam,
       throwing arm pivoted high with the long end up-left, sling
       and pouch hanging from the tip, counterweight box hung on
       the short end. currentColor fills and chunky strokes only.
       ============================================================ -->

  <!-- == ground beam == -->
  <rect fill="currentColor" x="5.5" y="54" width="52" height="4.5" rx="2"/>

  <!-- == A-frame legs and crossbar (stroked, round caps) == -->
  <g stroke="currentColor" stroke-linecap="round" fill="none">
    <path stroke-width="4.6" d="M27 25.5 L15 53"/>
    <path stroke-width="4.6" d="M27 25.5 L39 53"/>
    <path stroke-width="3.4" d="M18.5 42 L35.5 42"/>
  </g>

  <!-- == throwing arm: long end up-left, short end down-right == -->
  <rect fill="currentColor" x="-27" y="-2.1" width="47.5" height="4.2" rx="2.1"
        transform="translate(27 25) rotate(44)"/>

  <!-- == counterweight box: the arm's short end plunges solidly
       into its top-left corner (classic silhouette merge) == -->
  <path fill="currentColor" d="M36 36 L50 36 L51.5 50 Q42 52.8 34.5 50 Z"/>

  <!-- == sling rope and pouch hanging from the long tip == -->
  <path stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"
        d="M7.6 6.2 Q5.8 13.5 10.2 18.5"/>
  <circle fill="currentColor" cx="12" cy="20.5" r="3.4"/>

  <!-- == pivot hub with cut-out axle hole == -->
  <path fill="currentColor" fill-rule="evenodd" d="
    M22.2 25 A4.8 4.8 0 1 0 31.8 25 A4.8 4.8 0 1 0 22.2 25 Z
    M25.2 25 A1.8 1.8 0 1 0 28.8 25 A1.8 1.8 0 1 0 25.2 25 Z"/>
</svg>
