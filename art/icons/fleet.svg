<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="fleet-icon" role="img" aria-labelledby="fleet-title">
  <title id="fleet-title">Fleet — lateen-rigged war galley with oars</title>

  <!-- ============================================================
       IMPERIUM: Twilight of Empires — action icon: FLEET
       War galley in profile, bow to the right: crescent hull with
       a waterline ram, raked lateen yard with a bellied triangular
       sail, mast stub, and four banked oars trailing sternward.
       Pure currentColor silhouette; shapes separated by negative
       space rather than outlines.
       ============================================================ -->

  <g fill="currentColor">
    <!-- == lateen yard: long raked spar, low end forward-left == -->
    <rect x="7" y="13.8" width="49" height="3.4" rx="1.7"
          transform="rotate(-21 31.5 15.5)"/>

    <!-- == sail: hangs below the yard (2.5 gap keeps the spar
         legible); leech bellies aft, foot bellies down == -->
    <path d="M12.5 26.5 L51.5 11.5 Q51 26 44.5 35.5 Q27 33.5 12.5 26.5 Z"/>

    <!-- == mast stub bridging sail foot to deck == -->
    <rect x="30.2" y="31.5" width="3.4" height="12"/>

    <!-- == hull: upswept stern (left), sheer line, bow rising to a
         waterline ram beak (right), full belly below == -->
    <path d="M6 32.5
             Q8.5 40.5 16 41.5
             L45 41.5
             Q51 41 54.5 36
             L59.5 39.5
             Q57.5 45.5 51 48.5
             Q42 52 26 52
             Q10.5 51.5 5.5 40
             Z"/>

    <!-- == four oars, blades trailing toward the stern; tops are
         buried in the hull so the bank reads as one unit == -->
    <rect x="-1.6" y="0" width="3.2" height="12.5" transform="translate(17 47) rotate(18)"/>
    <rect x="-1.6" y="0" width="3.2" height="12.5" transform="translate(26 47) rotate(18)"/>
    <rect x="-1.6" y="0" width="3.2" height="12.5" transform="translate(35 47) rotate(18)"/>
    <rect x="-1.6" y="0" width="3.2" height="12.5" transform="translate(44 47) rotate(18)"/>
  </g>
</svg>
