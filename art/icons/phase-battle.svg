<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" id="phase-battle-icon" role="img" aria-labelledby="phase-battle-title">
  <title id="phase-battle-title">Battle phase — two crossed swords, blades up</title>

  <!-- ============================================================
       IMPERIUM: Twilight of Empires — phase icon: BATTLE
       Two arming swords crossed in saltire, points up, meeting at
       (32,29.5). The rear sword's blade is split with a keyline
       gap so the front blade reads as passing over it. Single
       color: every shape currentColor.
       ============================================================ -->

  <defs>
    <!-- == shared hilt: cross-guard, grip, pommel — authored
         vertical, pivot at (32,29.5) == -->
    <g id="phase-battle-hilt" fill="currentColor">
      <rect x="21.4" y="42.5" width="21.2" height="4.6" rx="2.3"/>
      <rect x="29.9" y="47.1" width="4.2" height="8.4"/>
      <circle cx="32" cy="59.1" r="4.1"/>
    </g>
    <!-- == full blade: tip (32,1.5), 6.6 wide, shoulders at y=8 == -->
    <path id="phase-battle-blade" fill="currentColor"
          d="M32 1.5 L35.3 8 L35.3 42.5 L28.7 42.5 L28.7 8 Z"/>
    <!-- == split blade for the rear sword: 10.8-unit gap centered
         on the crossing so the front blade passes over == -->
    <path id="phase-battle-blade-rear" fill="currentColor" d="
      M32 1.5 L35.3 8 L35.3 24.1 L28.7 24.1 L28.7 8 Z
      M28.7 34.9 L35.3 34.9 L35.3 42.5 L28.7 42.5 Z"/>
  </defs>

  <!-- == rear sword: points up-left == -->
  <g transform="rotate(-40 32 29.5)">
    <use href="#phase-battle-blade-rear"/>
    <use href="#phase-battle-hilt"/>
  </g>

  <!-- == front sword: points up-right, drawn over the rear == -->
  <g transform="rotate(40 32 29.5)">
    <use href="#phase-battle-blade"/>
    <use href="#phase-battle-hilt"/>
  </g>
</svg>
