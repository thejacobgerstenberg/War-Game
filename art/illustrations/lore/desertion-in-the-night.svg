<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Desertion in the Night</title>
  <!-- vellum plate -->
  <rect x="0" y="0" width="260" height="160" fill="#E2D3B3"/>
  <!-- night sky -->
  <rect x="6" y="6" width="248" height="86" fill="#2C5F7C"/>
  <!-- open water -->
  <rect x="6" y="92" width="248" height="62" fill="#1F4E79"/>
  <!-- crescent moon -->
  <circle cx="46" cy="34" r="16" fill="#C9A227"/>
  <circle cx="53" cy="30" r="14" fill="#2C5F7C"/>
  <!-- stars -->
  <polygon points="120,12 123,17 120,22 117,17" fill="#C9A227"/>
  <polygon points="166,26 169,31 166,36 163,31" fill="#C9A227"/>
  <polygon points="88,58 91,63 88,68 85,63" fill="#C9A227"/>
  <!-- moon road on the water -->
  <rect x="36" y="102" width="22" height="3" fill="#C9A227"/>
  <rect x="42" y="112" width="14" height="3" fill="#C9A227"/>
  <rect x="38" y="122" width="18" height="3" fill="#C9A227"/>
  <!-- sea-wall and tower, held by those who stay -->
  <rect x="196" y="66" width="58" height="88" fill="#2B2118"/>
  <rect x="196" y="58" width="7" height="8" fill="#2B2118"/>
  <rect x="207" y="58" width="7" height="8" fill="#2B2118"/>
  <rect x="214" y="34" width="40" height="120" fill="#2B2118"/>
  <rect x="214" y="26" width="8" height="8" fill="#2B2118"/>
  <rect x="230" y="26" width="8" height="8" fill="#2B2118"/>
  <rect x="246" y="26" width="8" height="8" fill="#2B2118"/>
  <!-- one lit window: the watch that remains -->
  <circle cx="232" cy="56" r="4" fill="#C9A227"/>
  <rect x="228" y="56" width="8" height="12" fill="#C9A227"/>
  <!-- far boat already gone ahead -->
  <path d="M20 97 L26 101 L44 101 L41 106 Q30 108 25 105 Z" fill="#2B2118"/>
  <!-- wake left behind, trailing back to the wall -->
  <rect x="148" y="120" width="16" height="3" fill="#E2D3B3"/>
  <rect x="170" y="125" width="12" height="3" fill="#E2D3B3"/>
  <rect x="188" y="130" width="9" height="3" fill="#E2D3B3"/>
  <!-- the deserters' boat, prow to open water -->
  <path d="M62 106 L74 118 L140 118 L133 130 Q102 137 79 130 Z" fill="#2B2118"/>
  <circle cx="94" cy="104" r="5" fill="#2B2118"/>
  <path d="M85 118 Q94 105 103 118 Z" fill="#2B2118"/>
  <circle cx="114" cy="104" r="5" fill="#2B2118"/>
  <path d="M105 118 Q114 105 123 118 Z" fill="#2B2118"/>
  <circle cx="131" cy="107" r="4" fill="#2B2118"/>
  <path d="M124 118 Q131 108 138 118 Z" fill="#2B2118"/>
  <!-- oars dipped quiet -->
  <path d="M98 114 L82 132" stroke="#2B2118" stroke-width="3" fill="none"/>
  <path d="M118 114 L102 132" stroke="#2B2118" stroke-width="3" fill="none"/>
</svg>
