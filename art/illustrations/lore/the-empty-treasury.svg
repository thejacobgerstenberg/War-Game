<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>the empty treasury</title>

  <!-- parchment field -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- dark ground band -->
  <rect x="0" y="124" width="260" height="36" fill="#4B1F3F"/>

  <!-- lid, thrown open behind the chest: ink rim, porphyry inner face -->
  <path d="M78,88 L78,46 Q78,24 100,24 L176,24 Q198,24 198,46 L198,88 Z" fill="#2B2118"/>
  <path d="M86,88 L86,50 Q86,32 102,32 L174,32 Q190,32 190,50 L190,88 Z" fill="#4B1F3F"/>

  <!-- chest body: ink casing, porphyry front panel -->
  <rect x="74" y="84" width="128" height="50" fill="#2B2118"/>
  <rect x="80" y="90" width="116" height="38" fill="#4B1F3F"/>

  <!-- gaping empty mouth of the coffer -->
  <path d="M80,90 Q138,101 196,90 Q138,81 80,90 Z" fill="#2B2118"/>

  <!-- iron straps -->
  <rect x="100" y="84" width="10" height="50" fill="#2B2118"/>
  <rect x="166" y="84" width="10" height="50" fill="#2B2118"/>

  <!-- lock plate, the last gold left on the chest -->
  <rect x="129" y="96" width="18" height="20" fill="#C9A227"/>
  <circle cx="138" cy="103" r="3" fill="#2B2118"/>
  <polygon points="136,112 140,112 139,104 137,104" fill="#2B2118"/>

  <!-- the crown, toppled in the dust before the coffer -->
  <g transform="translate(44,112) rotate(102)">
    <polygon points="0,26 0,16 7,2 14,16 20,0 26,16 33,2 40,16 40,26" fill="#C9A227"/>
  </g>

  <!-- the last stray coins -->
  <circle cx="215" cy="140" r="5" fill="#C9A227"/>
  <circle cx="230" cy="148" r="5" fill="#C9A227"/>
  <circle cx="64" cy="146" r="5" fill="#C9A227"/>
</svg>
