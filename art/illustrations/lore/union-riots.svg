<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Union Riots</title>
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- Hagia Sophia: body, shoulders, semi-domes, great dome -->
  <rect x="70" y="78" width="120" height="54" fill="#C9A227"/>
  <rect x="48" y="100" width="22" height="32" fill="#C9A227"/>
  <rect x="190" y="100" width="22" height="32" fill="#C9A227"/>
  <path d="M48 100 A11 11 0 0 1 70 100 Z" fill="#C9A227"/>
  <path d="M190 100 A11 11 0 0 1 212 100 Z" fill="#C9A227"/>
  <path d="M70 78 A18 18 0 0 1 106 78 Z" fill="#C9A227"/>
  <path d="M154 78 A18 18 0 0 1 190 78 Z" fill="#C9A227"/>
  <path d="M88 78 A42 42 0 0 1 172 78 Z" fill="#C9A227"/>

  <!-- cross above the dome -->
  <rect x="127" y="14" width="6" height="24" fill="#4B1F3F"/>
  <rect x="117" y="21" width="26" height="6" fill="#4B1F3F"/>

  <!-- door and windows -->
