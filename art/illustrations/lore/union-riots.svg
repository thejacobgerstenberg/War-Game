  <circle cx="14" cy="133" r="9" fill="#2B2118"/>
  <circle cx="40" cy="133" r="9" fill="#2B2118"/>
  <circle cx="66" cy="133" r="9" fill="#2B2118"/>
  <circle cx="92" cy="133" r="9" fill="#2B2118"/>
  <circle cx="118" cy="133" r="9" fill="#2B2118"/>
  <circle cx="144" cy="133" r="9" fill="#2B2118"/>
  <circle cx="170" cy="133" r="9" fill="#2B2118"/>
  <circle cx="196" cy="133" r="9" fill="#2B2118"/>
  <circle cx="222" cy="133" r="9" fill="#2B2118"/>
  <circle cx="248" cy="133" r="9" fill="#2B2118"/>

  <rect x="25" y="104" width="6" height="32" fill="#2B2118"/>
  <circle cx="28" cy="101" r="5.5" fill="#2B2118"/>
  <rect x="104" y="100" width="6" height="36" fill="#2B2118"/>
  <circle cx="107" cy="97" r="5.5" fill="#2B2118"/>
  <rect x="147" y="104" width="6" height="32" fill="#2B2118"/>
  <circle cx="150" cy="101" r="5.5" fill="#2B2118"/>
  <rect x="233" y="106" width="6" height="30" fill="#2B2118"/>
