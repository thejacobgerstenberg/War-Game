<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>papal envoy</title>

  <!-- parchment field -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- crossed keys of Saint Peter, behind the legate -->
  <g transform="translate(130,62) rotate(32)">
    <rect x="-3" y="-40" width="6" height="62" fill="#C9A227"/>
    <circle cx="0" cy="-44" r="9" fill="#C9A227"/>
    <circle cx="0" cy="-44" r="4" fill="#F0E6D2"/>
    <rect x="2" y="10" width="10" height="5" fill="#C9A227"/>
    <rect x="2" y="18" width="8" height="5" fill="#C9A227"/>
  </g>
  <g transform="translate(130,62) rotate(-32)">
    <rect x="-3" y="-40" width="6" height="62" fill="#C9A227"/>
    <circle cx="0" cy="-44" r="9" fill="#C9A227"/>
    <circle cx="0" cy="-44" r="4" fill="#F0E6D2"/>
    <rect x="-12" y="10" width="10" height="5" fill="#C9A227"/>
    <rect x="-10" y="18" width="8" height="5" fill="#C9A227"/>
  </g>

  <!-- ground -->
  <rect x="0" y="146" width="260" height="14" fill="#E2D3B3"/>
  <rect x="0" y="142" width="260" height="4" fill="#2B2118"/>

  <!-- face -->
  <circle cx="130" cy="52" r="10" fill="#E2D3B3"/>

  <!-- scarlet cassock -->
  <path d="M106,70 L97,144 L163,144 L154,70 Q130,60 106,70 Z" fill="#7A1F2B"/>

  <!-- raised arm, blessing -->
  <polygon points="118,77 110,83 86,53 94,47" fill="#7A1F2B"/>
  <circle cx="88" cy="44" r="5.5" fill="#E2D3B3"/>
  <rect x="84" y="29" width="3.5" height="14" fill="#E2D3B3"/>
  <rect x="89" y="27" width="3.5" height="16" fill="#E2D3B3"/>

  <!-- extended arm, presenting the bill -->
  <polygon points="148,75 144,85 174,97 178,87" fill="#7A1F2B"/>
  <circle cx="180" cy="92" r="5" fill="#E2D3B3"/>

  <!-- the bill, with seal of Rome -->
  <rect x="172" y="96" width="30" height="32" fill="#E2D3B3" stroke="#2B2118" stroke-width="2"/>
  <rect x="178" y="103" width="18" height="2.5" fill="#2B2118"/>
  <rect x="178" y="109" width="18" height="2.5" fill="#2B2118"/>
  <rect x="178" y="115" width="12" height="2.5" fill="#2B2118"/>
  <path d="M187,128 L187,133" stroke="#2B2118" stroke-width="2" fill="none"/>
  <circle cx="187" cy="137" r="6" fill="#C9A227"/>

  <!-- pectoral cross -->
  <rect x="127.5" y="84" width="5" height="18" fill="#C9A227"/>
  <rect x="121" y="89" width="18" height="5" fill="#C9A227"/>

  <!-- galero hat and tassels -->
  <ellipse cx="130" cy="40" rx="36" ry="5" fill="#7A1F2B"/>
  <path d="M116,40 Q130,24 144,40 Z" fill="#7A1F2B"/>
  <path d="M96,43 Q86,50 82,57" stroke="#7A1F2B" stroke-width="2" fill="none"/>
  <circle cx="82" cy="60" r="4" fill="#7A1F2B"/>
  <path d="M164,43 Q174,50 178,57" stroke="#7A1F2B" stroke-width="2" fill="none"/>
  <circle cx="178" cy="60" r="4" fill="#7A1F2B"/>

  <!-- chronicle frame -->
  <rect x="2" y="2" width="256" height="156" fill="none" stroke="#2B2118" stroke-width="4"/>
</svg>
