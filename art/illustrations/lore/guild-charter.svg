<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>guild charter</title>
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- marginalia corner brackets -->
  <polygon points="0,0 20,0 0,20" fill="#2B2118"/>
  <polygon points="260,0 240,0 260,20" fill="#2B2118"/>
  <polygon points="0,160 0,140 20,160" fill="#2B2118"/>
  <polygon points="260,160 260,140 240,160" fill="#2B2118"/>

  <!-- treasury coin stacks -->
  <ellipse cx="40" cy="149" rx="16" ry="7" fill="#2B2118"/>
  <ellipse cx="40" cy="147" rx="13" ry="5" fill="#C9A227"/>
  <ellipse cx="40" cy="141" rx="16" ry="7" fill="#2B2118"/>
  <ellipse cx="40" cy="139" rx="13" ry="5" fill="#C9A227"/>
  <ellipse cx="40" cy="133" rx="16" ry="7" fill="#2B2118"/>
  <ellipse cx="40" cy="131" rx="13" ry="5" fill="#C9A227"/>

  <ellipse cx="220" cy="149" rx="16" ry="7" fill="#2B2118"/>
  <ellipse cx="220" cy="147" rx="13" ry="5" fill="#C9A227"/>
  <ellipse cx="220" cy="141" rx="16" ry="7" fill="#2B2118"/>
  <ellipse cx="220" cy="139" rx="13" ry="5" fill="#C9A227"/>

  <!-- charter sheet with bold ink border -->
  <rect x="84" y="14" width="92" height="98" fill="#2B2118"/>
  <rect x="89" y="19" width="82" height="88" fill="#E2D3B3"/>

  <!-- rolled top edge -->
  <rect x="78" y="9" width="104" height="11" rx="5" fill="#2B2118"/>
  <circle cx="83" cy="14" r="3" fill="#E2D3B3"/>
  <circle cx="177" cy="14" r="3" fill="#E2D3B3"/>

  <!-- illuminated initial -->
  <rect x="96" y="28" width="14" height="14" fill="#7A1F2B"/>
  <rect x="100" y="32" width="6" height="6" fill="#C9A227"/>

  <!-- abstract text bars -->
  <rect x="116" y="29" width="46" height="5" fill="#2B2118"/>
  <rect x="116" y="37" width="40" height="5" fill="#2B2118"/>
  <rect x="96" y="50" width="64" height="5" fill="#2B2118"/>
  <rect x="96" y="59" width="58" height="5" fill="#2B2118"/>
  <rect x="96" y="68" width="64" height="5" fill="#2B2118"/>
  <rect x="96" y="77" width="44" height="5" fill="#2B2118"/>

  <!-- gold ribbon tails -->
  <polygon points="124,98 132,98 108,144 96,138" fill="#C9A227"/>
  <polygon points="128,98 136,98 164,138 152,144" fill="#C9A227"/>

  <!-- hanging wax seal -->
  <circle cx="130" cy="128" r="21" fill="#2B2118"/>
  <circle cx="130" cy="128" r="17" fill="#7A1F2B"/>
  <rect x="127" y="115" width="6" height="26" fill="#C9A227"/>
  <rect x="117" y="125" width="26" height="6" fill="#C9A227"/>
</svg>
