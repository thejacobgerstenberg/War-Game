<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Akce Debasement</title>
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- great akce coin, its upper-right edge sheared flat -->
  <path d="M124 38 A55 55 0 1 0 157 71 Z" fill="#2B2118"/>
  <path d="M121 45 A48 48 0 1 0 150 74 Z" fill="#C9A227"/>
  <circle cx="105" cy="90" r="38" fill="#E2D3B3"/>

  <!-- crescent and star of the mint -->
  <path d="M114 70 A26 26 0 1 0 114 110 A22 22 0 1 1 114 70 Z" fill="#2B2118"/>
  <polygon points="121,81 122.9,86.4 128.6,86.5 124,90 125.7,95.5 121,92.2 116.3,95.5 118,90 113.4,86.5 119.1,86.4" fill="#2B2118"/>

  <!-- the crack from the cut face -->
  <polygon points="144,66 137,83 147,97 130,132 123,128 140,96 130,82 137,63" fill="#7A1F2B"/>

  <!-- the shaved sliver, lifted away -->
  <path d="M136 26 A55 55 0 0 1 169 59 Z" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>

  <!-- spring shears of the mint, jaws at the cut -->
  <polygon points="162,52 206,22 210,29" fill="#2B2118"/>
  <polygon points="170,66 214,40 217,47" fill="#2B2118"/>
  <path d="M208 25 A13 13 0 0 1 216 44" fill="none" stroke="#2B2118" stroke-width="7"/>

  <!-- falling shavings -->
  <polygon points="180,92 196,98 182,100" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
  <polygon points="166,114 180,122 168,124" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
</svg>
