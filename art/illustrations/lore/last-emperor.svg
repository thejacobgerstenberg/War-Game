<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Last Emperor</title>

  <!-- vellum ground -->
  <rect x="0" y="0" width="260" height="160" fill="#E2D3B3"/>

  <!-- broken theodosian wall, left flank -->
  <polygon points="0,160 0,43 14,43 14,55 27,55 27,43 41,43 41,55 54,55 54,43 68,43 68,55 80,55 88,72 78,90 92,108 82,126 96,144 88,160" fill="#2B2118"/>

  <!-- broken theodosian wall, right flank -->
  <polygon points="260,160 260,43 246,43 246,55 233,55 233,43 219,43 219,55 206,55 206,43 192,43 192,55 180,55 172,72 182,90 168,108 178,126 164,144 172,160" fill="#2B2118"/>

  <!-- cracks in the stone -->
  <polygon points="34,66 38,66 32,92 38,116 33,118 27,92" fill="#E2D3B3"/>
  <polygon points="226,66 222,66 228,92 222,118 227,116 233,92" fill="#E2D3B3"/>

  <!-- rubble heaped in the breach -->
  <polygon points="80,160 88,144 98,150 106,138 118,146 130,136 142,146 154,138 162,150 172,144 180,160" fill="#2B2118"/>

  <!-- the purple, put off and cast down -->
  <path d="M 90 154 Q 92 136 102 138 Q 108 128 114 138 Q 120 142 116 152 Q 104 158 90 154 Z" fill="#4B1F3F"/>

  <!-- the crown, laid aside on the stones -->
  <polygon points="142,152 164,148 161,136 157,144 152,133 148,143 144,135 141,144" fill="#C9A227"/>

  <!-- nimbus of the saint-emperor -->
  <circle cx="130" cy="58" r="15" fill="#C9A227"/>

  <!-- constantine, a common soldier in the breach -->
  <circle cx="130" cy="60" r="9" fill="#2B2118"/>
  <rect x="126" y="66" width="8" height="10" fill="#2B2118"/>
  <polygon points="112,76 148,76 144,106 148,140 136,140 132,112 128,112 124,140 112,140 116,106" fill="#2B2118"/>

  <!-- his sword, point to the earth -->
  <circle cx="130" cy="88" r="4" fill="#C9A227"/>
  <rect x="118" y="92" width="24" height="5" fill="#C9A227"/>
  <polygon points="127,97 133,97 130,150" fill="#C9A227"/>

  <!-- arrows converging on the one man standing -->
  <path d="M 84 16 L 106 23 L 108 17 L 122 27 L 104 32 L 106 26 L 83 21 Z" fill="#2B2118"/>
  <path d="M 176 16 L 154 23 L 152 17 L 138 27 L 156 32 L 154 26 L 177 21 Z" fill="#2B2118"/>
</svg>
