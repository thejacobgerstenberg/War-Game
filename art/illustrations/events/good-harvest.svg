<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>good harvest</title>
  <!-- parchment field -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>
  <!-- laurel ground -->
  <path d="M0,132 Q65,122 130,129 Q195,136 260,127 L260,160 L0,160 Z" fill="#4A5D3A"/>
  <!-- crimson sun, top-left -->
  <polygon points="30,2 25,12 35,12" fill="#7A1F2B"/>
  <polygon points="30,54 25,44 35,44" fill="#7A1F2B"/>
  <polygon points="56,28 46,23 46,33" fill="#7A1F2B"/>
  <polygon points="4,28 14,23 14,33" fill="#7A1F2B"/>
  <polygon points="48,10 45,20 38,13" fill="#7A1F2B"/>
  <polygon points="12,10 22,13 15,20" fill="#7A1F2B"/>
  <polygon points="48,46 38,43 45,36" fill="#7A1F2B"/>
  <polygon points="12,46 15,36 22,43" fill="#7A1F2B"/>
  <circle cx="30" cy="28" r="13" fill="#7A1F2B"/>
  <!-- ink birds, top-right -->
  <path d="M188,32 q7,-7 14,0 q7,-7 14,0" fill="none" stroke="#2B2118" stroke-width="3"/>
  <path d="M212,46 q6,-6 12,0 q6,-6 12,0" fill="none" stroke="#2B2118" stroke-width="3"/>
  <!-- sheaf: seven gold stalks fanning from the waist -->
  <polygon points="116,100 122,96 85,54 80,60" fill="#C9A227"/>
  <polygon points="119,97 125,95 101,46 95,50" fill="#C9A227"/>
  <polygon points="123,96 129,94 115,42 109,44" fill="#C9A227"/>
  <rect x="127" y="44" width="6" height="52" fill="#C9A227"/>
  <polygon points="131,94 137,96 151,44 145,42" fill="#C9A227"/>
  <polygon points="135,95 141,97 165,50 159,46" fill="#C9A227"/>
  <polygon points="138,96 144,100 180,60 175,54" fill="#C9A227"/>
  <!-- wheat ears -->
  <polygon points="58,36 77,43 86,62 67,55" fill="#C9A227"/>
  <polygon points="81,20 98,32 101,52 84,40" fill="#C9A227"/>
  <polygon points="107,10 120,26 117,46 104,30" fill="#C9A227"/>
  <polygon points="130,8 139,28 130,48 121,28" fill="#C9A227"/>
  <polygon points="153,10 156,30 143,46 140,26" fill="#C9A227"/>
  <polygon points="179,20 176,40 159,52 162,32" fill="#C9A227"/>
  <polygon points="202,36 193,55 174,62 183,43" fill="#C9A227"/>
  <!-- skirt of the sheaf splaying to the ground -->
  <polygon points="118,104 88,138 108,142 130,144 152,142 172,138 142,104" fill="#C9A227"/>
  <!-- parchment wedge cuts to part the lower stalks -->
  <polygon points="122,108 110,139 117,140" fill="#F0E6D2"/>
  <polygon points="130,108 126,142 134,142" fill="#F0E6D2"/>
  <polygon points="139,108 144,140 151,139" fill="#F0E6D2"/>
  <!-- ink binding cord -->
  <polygon points="114,92 146,92 148,106 112,106" fill="#2B2118"/>
</svg>
