<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Serbian Despotate Submits</title>
  <!-- parchment ground -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>
  <!-- earth -->
  <rect x="0" y="144" width="260" height="16" fill="#2B2118"/>
  <!-- the Despot's fortress, kept in excellent repair -->
  <rect x="14" y="90" width="46" height="54" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <rect x="14" y="82" width="10" height="10" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <rect x="32" y="82" width="10" height="10" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <rect x="50" y="82" width="10" height="10" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <rect x="28" y="56" width="18" height="34" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <rect x="26" y="48" width="7" height="9" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <rect x="41" y="48" width="7" height="9" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <rect x="35" y="26" width="3" height="24" fill="#2B2118"/>
  <polygon points="38,28 58,33 38,38" fill="#4B1F3F"/>
  <circle cx="37" cy="126" r="7" fill="#2B2118"/>
  <rect x="30" y="126" width="14" height="18" fill="#2B2118"/>
  <!-- the heavier neighbor, looming -->
  <polygon points="186,144 194,84 204,62 228,62 240,84 248,144" fill="#2B2118"/>
  <circle cx="216" cy="50" r="15" fill="#2B2118"/>
  <polygon points="198,46 202,32 216,24 230,32 234,46" fill="#2B2118"/>
  <circle cx="216" cy="36" r="7" fill="#C9A227"/>
  <circle cx="219" cy="34" r="6" fill="#2B2118"/>
  <!-- his hand comes down for the key -->
  <polygon points="196,86 184,88 182,98 197,102" fill="#2B2118"/>
  <circle cx="181" cy="93" r="6" fill="#2B2118"/>
  <!-- the Despot kneels at the hour of his choosing -->
  <polygon points="98,144 100,116 108,100 124,102 130,124 144,144" fill="#4B1F3F"/>
  <circle cx="118" cy="90" r="10" fill="#E2D3B3" stroke="#2B2118" stroke-width="3"/>
  <circle cx="121" cy="89" r="2" fill="#2B2118"/>
  <polygon points="112,98 122,98 118,108" fill="#2B2118"/>
  <polygon points="108,84 110,74 126,74 128,84" fill="#C9A227"/>
  <polygon points="122,104 148,92 150,98 126,110" fill="#4B1F3F"/>
  <!-- the key of the small realm, offered up -->
  <circle cx="146" cy="90" r="8" fill="#C9A227"/>
  <circle cx="146" cy="90" r="3.5" fill="#F0E6D2"/>
  <rect x="152" y="87" width="28" height="6" fill="#C9A227"/>
  <rect x="166" y="93" width="5" height="6" fill="#C9A227"/>
  <rect x="174" y="93" width="5" height="8" fill="#C9A227"/>
  <!-- tribute paid to the day -->
  <circle cx="99" cy="141" r="3" fill="#C9A227"/>
  <circle cx="108" cy="140" r="4" fill="#C9A227"/>
  <circle cx="118" cy="142" r="4" fill="#C9A227"/>
</svg>
