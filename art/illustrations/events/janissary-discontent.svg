<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Janissary Discontent</title>

  <!-- parchment field -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>
  <!-- vellum barrack-yard ground -->
  <rect x="0" y="112" width="260" height="48" fill="#E2D3B3"/>

  <!-- the crescent of the Sultan, looking on -->
  <circle cx="216" cy="32" r="16" fill="#7A1F2B"/>
  <circle cx="223" cy="27" r="14" fill="#F0E6D2"/>

  <!-- the great regiment kettle, overturned: focal subject -->
  <g transform="rotate(-100 150 96)">
    <!-- body -->
    <path d="M120,66 Q114,112 150,120 Q186,112 180,66 Z" fill="#2B2118"/>
    <!-- rim -->
    <rect x="114" y="58" width="72" height="9" fill="#2B2118"/>
    <!-- open mouth ring -->
    <ellipse cx="150" cy="62.5" rx="31" ry="5.5" fill="#E2D3B3"/>
    <ellipse cx="150" cy="62.5" rx="24" ry="3" fill="#2B2118"/>
    <!-- crimson regiment band -->
    <rect x="121" y="73" width="58" height="11" fill="#7A1F2B"/>
    <!-- ring handles -->
    <circle cx="111" cy="77" r="6" fill="#2B2118"/>
    <circle cx="189" cy="77" r="6" fill="#2B2118"/>
  </g>

  <!-- pottage spilled across the yard -->
  <path d="M112,104 Q96,116 74,120 Q44,124 30,134 Q24,140 34,144 L112,144 Q120,128 112,104 Z" fill="#2B2118"/>

  <!-- the donative demanded: three gold pieces -->
  <circle cx="46" cy="118" r="7" fill="#C9A227"/>
  <circle cx="64" cy="132" r="6" fill="#C9A227"/>
  <circle cx="38" cy="138" r="6" fill="#C9A227"/>

  <!-- lid cast aside -->
  <ellipse cx="214" cy="140" rx="21" ry="7" fill="#2B2118"/>
  <circle cx="214" cy="134" r="4" fill="#C9A227"/>

  <!-- ladle dropped where it fell -->
  <g transform="rotate(24 176 148)">
    <rect x="150" y="146" width="44" height="4" fill="#2B2118"/>
    <circle cx="146" cy="148" r="7" fill="#2B2118"/>
    <circle cx="146" cy="147" r="3" fill="#E2D3B3"/>
  </g>
</svg>
