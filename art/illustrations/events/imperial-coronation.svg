<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>imperial coronation</title>
  <!-- parchment field -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- the heaven-arc from which the crown descends -->
  <path d="M85,0 A45,45 0 0 1 175,0 Z" fill="#4B1F3F"/>
  <circle cx="130" cy="0" r="36" fill="none" stroke="#C9A227" stroke-width="4"/>

  <!-- rays of anointing light -->
  <polygon points="112,42 118,44 100,82 94,80" fill="#C9A227"/>
  <polygon points="148,42 142,44 160,82 166,80" fill="#C9A227"/>
  <polygon points="96,32 100,36 74,64 70,60" fill="#C9A227"/>
  <polygon points="164,32 160,36 186,64 190,60" fill="#C9A227"/>

  <!-- the crown: focal subject -->
  <rect x="127" y="22" width="6" height="22" fill="#C9A227"/>
  <rect x="120" y="28" width="20" height="6" fill="#C9A227"/>
  <polygon points="92,86 104,52 116,86" fill="#C9A227"/>
  <polygon points="118,86 130,44 142,86" fill="#C9A227"/>
  <polygon points="144,86 156,52 168,86" fill="#C9A227"/>
  <rect x="92" y="86" width="76" height="18" fill="#C9A227"/>
  <circle cx="108" cy="95" r="5" fill="#7A1F2B"/>
  <circle cx="130" cy="95" r="6" fill="#4B1F3F"/>
  <circle cx="152" cy="95" r="5" fill="#7A1F2B"/>

  <!-- herald trumpets, bells lifted outward and away from the crown -->
  <polygon points="73,117 31,39 25,41 67,119" fill="#C9A227"/>
  <polygon points="31,39 22,15 10,21 25,41" fill="#C9A227"/>
  <circle cx="70" cy="120" r="4" fill="#2B2118"/>
  <polygon points="40,62 58,68 56,86 46,80 36,84" fill="#7A1F2B"/>
  <polygon points="187,117 229,39 235,41 193,119" fill="#C9A227"/>
  <polygon points="229,39 238,15 250,21 235,41" fill="#C9A227"/>
  <circle cx="190" cy="120" r="4" fill="#2B2118"/>
  <polygon points="220,62 202,68 204,86 214,80 224,84" fill="#7A1F2B"/>

  <!-- largesse raining on the crowd -->
  <circle cx="86" cy="114" r="4" fill="#C9A227"/>
  <circle cx="100" cy="126" r="4" fill="#C9A227"/>
  <circle cx="118" cy="118" r="4" fill="#C9A227"/>
  <circle cx="142" cy="124" r="4" fill="#C9A227"/>
  <circle cx="160" cy="126" r="4" fill="#C9A227"/>
  <circle cx="174" cy="114" r="4" fill="#C9A227"/>

  <!-- the levies, standing a little straighter -->
  <rect x="0" y="140" width="260" height="20" fill="#2B2118"/>
  <circle cx="14" cy="140" r="7" fill="#2B2118"/>
  <circle cx="36" cy="140" r="7" fill="#2B2118"/>
  <circle cx="58" cy="140" r="7" fill="#2B2118"/>
  <circle cx="80" cy="140" r="7" fill="#2B2118"/>
  <circle cx="102" cy="140" r="7" fill="#2B2118"/>
  <circle cx="124" cy="140" r="7" fill="#2B2118"/>
  <circle cx="146" cy="140" r="7" fill="#2B2118"/>
  <circle cx="168" cy="140" r="7" fill="#2B2118"/>
  <circle cx="190" cy="140" r="7" fill="#2B2118"/>
  <circle cx="212" cy="140" r="7" fill="#2B2118"/>
  <circle cx="234" cy="140" r="7" fill="#2B2118"/>
  <circle cx="252" cy="140" r="7" fill="#2B2118"/>
</svg>
