<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Mamluk Embargo</title>
  <!-- parchment field -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- the eastern sea -->
  <rect x="0" y="128" width="260" height="32" fill="#2C5F7C"/>
  <path d="M0 140 Q10 134 20 140 T40 140 T60 140 T80 140 T100 140 T120 140 T140 140 T160 140 T180 140 T200 140 T220 140 T240 140 T260 140" fill="none" stroke="#F0E6D2" stroke-width="3"/>

  <!-- the spice road, entering from the west and going no further -->
  <rect x="0" y="74" width="100" height="9" fill="#C9A227"/>
  <rect x="184" y="80" width="9" height="6" fill="#C9A227"/>
  <rect x="200" y="90" width="6" height="5" fill="#C9A227"/>

  <!-- the Sultan's arm from above -->
  <rect x="122" y="0" width="50" height="42" fill="#4B1F3F"/>
  <rect x="116" y="28" width="62" height="12" fill="#C9A227"/>

  <!-- the closed fist: focal subject -->
  <rect x="98" y="38" width="76" height="46" rx="12" fill="#4B1F3F"/>
  <rect x="100" y="64" width="15" height="34" rx="7" fill="#4B1F3F"/>
  <rect x="118" y="64" width="15" height="34" rx="7" fill="#4B1F3F"/>
  <rect x="136" y="64" width="15" height="34" rx="7" fill="#4B1F3F"/>
  <rect x="154" y="64" width="15" height="34" rx="7" fill="#4B1F3F"/>
  <rect x="98" y="88" width="54" height="14" rx="7" fill="#4B1F3F"/>

  <!-- pepper under seal on the quay of Alexandria -->
  <rect x="0" y="120" width="104" height="8" fill="#2B2118"/>
  <path d="M12 120 Q12 98 30 98 Q48 98 48 120 Z" fill="#C9A227"/>
  <rect x="26" y="92" width="8" height="8" fill="#2B2118"/>
  <circle cx="30" cy="111" r="5" fill="#2B2118"/>
  <path d="M52 120 Q52 102 66 102 Q80 102 80 120 Z" fill="#C9A227"/>
  <rect x="63" y="96" width="7" height="8" fill="#2B2118"/>
  <circle cx="66" cy="112" r="4" fill="#2B2118"/>

  <!-- Mamluk galley standing off Cyprus -->
  <polygon points="182,142 254,142 242,153 190,153" fill="#2B2118"/>
  <path d="M182 142 Q174 136 176 128 L182 132 Z" fill="#2B2118"/>
  <rect x="216" y="108" width="3" height="34" fill="#2B2118"/>
  <polygon points="204,138 236,110 238,138" fill="#2B2118"/>
  <polygon points="219,108 234,104 219,113" fill="#2B2118"/>
</svg>
