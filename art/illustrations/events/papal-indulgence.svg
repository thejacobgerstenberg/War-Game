<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Papal Indulgence</title>
  <!-- parchment ground -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>
  <!-- ink backing board of the charter -->
  <rect x="64" y="8" width="132" height="102" fill="#2B2118"/>
  <!-- vellum face of the indulgence -->
  <rect x="70" y="14" width="120" height="90" fill="#E2D3B3"/>
  <!-- crossed keys of Saint Peter, gold, heading the letter -->
  <polygon points="102,50 146,22 151,29 107,57" fill="#C9A227"/>
  <polygon points="158,50 114,22 109,29 153,57" fill="#C9A227"/>
  <circle cx="151" cy="24" r="8" fill="#C9A227"/>
  <circle cx="151" cy="24" r="3" fill="#E2D3B3"/>
  <circle cx="109" cy="24" r="8" fill="#C9A227"/>
  <circle cx="109" cy="24" r="3" fill="#E2D3B3"/>
  <polygon points="98,44 105,49 100,56 94,51" fill="#C9A227"/>
  <polygon points="162,44 155,49 160,56 166,51" fill="#C9A227"/>
  <!-- rubric line, then lines of pardoner's script -->
  <rect x="84" y="64" width="92" height="4" fill="#7A1F2B"/>
  <rect x="84" y="73" width="84" height="3" fill="#2B2118"/>
  <rect x="84" y="81" width="92" height="3" fill="#2B2118"/>
  <rect x="84" y="89" width="70" height="3" fill="#2B2118"/>
  <rect x="84" y="97" width="52" height="3" fill="#2B2118"/>
  <!-- crimson cords to the hanging bulla -->
  <polygon points="122,104 127,124 131,124 127,104" fill="#7A1F2B"/>
  <polygon points="138,104 133,124 129,124 133,104" fill="#7A1F2B"/>
  <!-- the seal: wax ring, gold boss, ink cross -->
  <circle cx="130" cy="136" r="18" fill="#7A1F2B"/>
  <circle cx="130" cy="136" r="13" fill="#C9A227"/>
  <rect x="127" y="127" width="6" height="18" fill="#2B2118"/>
  <rect x="121" y="133" width="18" height="6" fill="#2B2118"/>
  <!-- coin stacked and counted, left -->
  <rect x="16" y="142" width="36" height="8" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
  <rect x="18" y="132" width="36" height="8" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
  <rect x="16" y="122" width="36" height="8" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
  <circle cx="58" cy="144" r="9" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
  <!-- loose coin scattered, right -->
  <circle cx="212" cy="140" r="10" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
  <circle cx="236" cy="148" r="8" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
  <circle cx="226" cy="122" r="7" fill="#C9A227" stroke="#2B2118" stroke-width="2"/>
</svg>
