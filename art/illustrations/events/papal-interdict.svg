<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Papal Interdict</title>

  <!-- vellum ground -->
  <rect x="0" y="0" width="260" height="160" fill="#E2D3B3"/>

  <!-- earth line -->
  <rect x="0" y="146" width="260" height="14" fill="#2B2118"/>

  <!-- church facade, doors shut -->
  <polygon points="64,58 130,18 196,58" fill="#2B2118"/>
  <rect x="70" y="56" width="120" height="90" fill="#2B2118"/>

  <!-- cross above the gable -->
  <rect x="127" y="2" width="6" height="18" fill="#C9A227"/>
  <rect x="121" y="7" width="18" height="6" fill="#C9A227"/>

  <!-- belfry arch, the bell hanging mute -->
  <path d="M113 54 v-10 a17 17 0 0 1 34 0 v10 Z" fill="#E2D3B3"/>
  <path d="M121 40 a9 9 0 0 1 18 0 v6 h-18 Z" fill="#C9A227"/>
  <polygon points="119,46 141,46 144,51 116,51" fill="#C9A227"/>
  <!-- the plank that binds the bell to silence -->
  <rect x="106" y="40" width="48" height="6" fill="#7A1F2B"/>

  <!-- door arch and the closed crimson doors -->
  <path d="M98 146 v-46 a32 32 0 0 1 64 0 v46 Z" fill="#E2D3B3"/>
  <path d="M103 146 v-44 a27 27 0 0 1 54 0 v44 Z" fill="#7A1F2B"/>
  <rect x="128" y="76" width="4" height="70" fill="#2B2118"/>

  <!-- bar nailed across the doors -->
  <rect x="92" y="114" width="76" height="9" fill="#2B2118"/>
  <circle cx="98" cy="118.5" r="2.5" fill="#E2D3B3"/>
  <circle cx="162" cy="118.5" r="2.5" fill="#E2D3B3"/>

  <!-- the leaden bull fixed to the door -->
  <circle cx="130" cy="94" r="15" fill="#4B1F3F"/>
  <polygon points="121,102 137,86 140,89 124,105" fill="#C9A227"/>
  <polygon points="139,102 123,86 120,89 136,105" fill="#C9A227"/>
  <circle cx="138" cy="87" r="3.5" fill="#C9A227"/>
  <circle cx="122" cy="87" r="3.5" fill="#C9A227"/>
  <circle cx="130" cy="81" r="2" fill="#2B2118"/>

  <!-- the faithful, kneeling and shut out -->
  <polygon points="30,146 52,146 47,126 35,126" fill="#2B2118"/>
  <circle cx="44" cy="120" r="6" fill="#2B2118"/>
  <polygon points="208,146 230,146 225,126 213,126" fill="#2B2118"/>
  <circle cx="216" cy="120" r="6" fill="#2B2118"/>
</svg>
