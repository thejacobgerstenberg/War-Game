<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Comet Omen</title>

  <!-- parchment field -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- the tail, dragged across the whole heaven -->
  <polygon points="196,34 0,0 0,30 196,50" fill="#C9A227"/>
  <!-- woodcut streaks carved out of the tail -->
  <polygon points="188,39 8,7 8,11 188,42" fill="#F0E6D2"/>
  <polygon points="184,45 16,22 16,26 184,48" fill="#F0E6D2"/>

  <!-- the blazing head: eight-point gold burst with a crimson heart -->
  <polygon points="232,44 214.2,48.2 223.8,63.8 208.2,54.2 204,72 199.8,54.2 184.2,63.8 193.8,48.2 176,44 193.8,39.8 184.2,24.2 199.8,33.8 204,16 208.2,33.8 223.8,24.2 214.2,39.8" fill="#C9A227"/>
  <circle cx="204" cy="44" r="8" fill="#7A1F2B"/>

  <!-- lesser stars, ignored tonight -->
  <polygon points="40,58 43,64 40,70 37,64" fill="#2B2118"/>
  <polygon points="96,46 99,52 96,58 93,52" fill="#2B2118"/>
  <polygon points="238,78 241,84 238,90 235,84" fill="#2B2118"/>

  <!-- left camp: crimson tents, a spear thrown down, a man praying -->
  <polygon points="14,146 34,114 54,146" fill="#7A1F2B"/>
  <polygon points="30,146 34,138 38,146" fill="#F0E6D2"/>
  <polygon points="56,146 71,122 86,146" fill="#7A1F2B"/>
  <g fill="#2B2118">
    <g transform="translate(96,146) scale(0.9)">
      <polygon points="-7,0 7,0 2,-16 -2,-16"/>
      <circle cx="0" cy="-21" r="5"/>
      <polygon points="-3,-14 -11,-26 -8,-29 -1,-16"/>
      <polygon points="3,-14 11,-26 8,-29 1,-16"/>
    </g>
    <polygon points="108,143 134,131 135,134 109,146"/>
    <polygon points="134,127 143,130 135,136"/>
  </g>

  <!-- right camp: lapis tents, spears upright, pennon flying -->
  <rect x="150" y="100" width="3" height="46" fill="#2B2118"/>
  <polygon points="151.5,88 156,102 147,102" fill="#2B2118"/>
  <rect x="162" y="92" width="3" height="54" fill="#2B2118"/>
  <polygon points="163.5,80 168,94 159,94" fill="#2B2118"/>
  <polygon points="165,82 183,88 165,94" fill="#C9A227"/>
  <polygon points="172,146 192,114 212,146" fill="#1F4E79"/>
  <polygon points="188,146 192,138 196,146" fill="#F0E6D2"/>
  <polygon points="214,146 229,122 244,146" fill="#1F4E79"/>

  <!-- earth line -->
  <rect x="0" y="146" width="260" height="14" fill="#2B2118"/>
</svg>
