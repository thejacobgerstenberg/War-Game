<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Fall of Constantinople</title>
  <!-- vellum sky -->
  <rect width="260" height="160" fill="#E2D3B3"/>
  <!-- blood-red dusk rising behind the Queen of Cities -->
  <circle cx="130" cy="195" r="130" fill="#7A1F2B"/>
  <!-- Hagia Sophia: flanking semidomes -->
  <path d="M54 142 V126 Q54 108 86 108 V142 Z" fill="#2B2118"/>
  <path d="M206 142 V126 Q206 108 174 108 V142 Z" fill="#2B2118"/>
  <!-- main body -->
  <rect x="78" y="106" width="104" height="36" fill="#2B2118"/>
  <!-- the great dome -->
  <path d="M86 106 A44 40 0 0 1 174 106 Z" fill="#2B2118"/>
  <!-- Theodosian wall -->
  <rect y="138" width="260" height="22" fill="#2B2118"/>
  <rect x="4" y="130" width="16" height="10" fill="#2B2118"/>
  <rect x="34" y="130" width="16" height="10" fill="#2B2118"/>
  <rect x="210" y="130" width="16" height="10" fill="#2B2118"/>
  <rect x="240" y="130" width="16" height="10" fill="#2B2118"/>
  <!-- the great doors, closing on an age -->
  <path d="M120 160 V146 A10 10 0 0 1 140 146 V160 Z" fill="#C9A227"/>
  <!-- the cross tumbles from the dome -->
  <g transform="translate(114 60) rotate(-38)">
    <rect x="-2" y="-9" width="4" height="18" fill="#C9A227"/>
    <rect x="-6" y="-5" width="12" height="4" fill="#C9A227"/>
  </g>
  <!-- the crescent rises -->
  <path d="M200 14 A22 22 0 0 1 200 58 A30 30 0 0 0 200 14 Z" fill="#C9A227"/>
</svg>
