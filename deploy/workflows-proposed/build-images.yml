# =============================================================================
# PROPOSAL — owned by the deploy workstream (feature/deploy-prep).
#
# This file is NOT active here: GitHub only executes workflows that live in
# .github/workflows/, and that directory is owned by the CI workstream
# (feature/ci) per CONTRIBUTING.md's directory-ownership rule. CI session: to
# adopt, move this file to .github/workflows/build-images.yml (e.g.
#   git mv deploy/workflows-proposed/build-images.yml .github/workflows/build-images.yml
# ) and delete/update deploy/workflows-proposed/README.md accordingly.
#
# Things to reconcile with the existing CI contract (feature/ci: ci.yml,
# pr-title.yml, balance-regression.yml — summarized in the team memory
# ci-contract-for-workstreams.md):
#   1. ci.yml feature-detects and SKIPS jobs for directories that don't exist
#      yet, so unmerged workstreams stay green. This workflow cannot skip that
#      way: the Dockerfiles COPY package.json, shared/, server/, client/,
#      which do not exist on main yet, so image builds will FAIL until the
#      scaffold merges. Either adopt this only after the scaffold lands, or
#      keep the "scaffold-present" guard job below (it makes the build jobs
#      no-op cleanly on a pre-scaffold main).
#   2. The Dockerfiles run the same `npm run build` (per workspace) that
#      ci.yml's code job runs with --if-present. Do not rename build scripts
#      without updating deploy/Dockerfile.server and deploy/Dockerfile.client.
#   3. Node/npm: images use node:20-slim, matching .nvmrc (20) and ci.yml's
#      setup-node. No lockfile exists yet, so the Dockerfiles use
#      `npm install` (the same fallback ci.yml uses); they should move to
#      `npm ci` once package-lock.json is committed.
#   4. paths-ignore below (audio/**, art/**, docs/**) should be kept in sync
#      with any path filters ci.yml adopts; consider also ignoring lore/**
#      (the docs job's other content dir) if it stays code-free.
#   5. permissions: this workflow needs `packages: write` on GITHUB_TOKEN for
#      GHCR pushes; the explicit block below overrides restrictive org/repo
#      default workflow permissions.
#   6. GHCR image paths must be lowercase (OCI spec) and this repo's name
#      (War-Game) is not, so a small step lowercases ${{ github.repository }}
#      before tagging. Keep that step — buildx rejects uppercase tags even on
#      push=false builds. The resulting images are
#      ghcr.io/<owner>/<repo>/server and ghcr.io/<owner>/<repo>/client,
#      tagged :latest and :<git sha>.
#
# Scope: BUILD-ONLY. Images are pushed to GHCR on main; nothing auto-deploys.
# Fly deploy stays manual per the "Fly.io runbook" in deploy/README.md; the
# GHCR images exist so Fly can later deploy pinned digests
# (fly deploy --image ghcr.io/...@sha256:...) instead of rebuilding remotely.
# =============================================================================

name: build-images

on:
  push:
    branches:
      - main
    paths-ignore:
      - "audio/**"
      - "art/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # TODO(scaffold): remove this guard job once the scaffold (root package.json
  # + server/ + client/ + shared/) has merged to main — it exists only so a
  # pre-scaffold main stays green instead of failing inside `docker build`
  # when the Dockerfiles COPY paths that don't exist yet.
  scaffold-present:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: Check that the workspace scaffold exists
        run: |
          if [ -f package.json ] && [ -d server ] && [ -d client ] && [ -d shared ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Scaffold not on this ref yet (need package.json, server/, client/, shared/) — skipping image builds." >> "$GITHUB_STEP_SUMMARY"
          fi

  build-server:
    runs-on: ubuntu-latest
    needs: scaffold-present
    if: needs.scaffold-present.outputs.present == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io/${{ github.repository }} lowercased — OCI repository names
      # must be lowercase and buildx rejects uppercase tags outright.
      - id: image
        name: Compute lowercase image base
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.image.outputs.base }}/server:latest
            ${{ steps.image.outputs.base }}/server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-client:
    runs-on: ubuntu-latest
    needs: scaffold-present
    if: needs.scaffold-present.outputs.present == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        name: Compute lowercase image base
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.client
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.image.outputs.base }}/client:latest
            ${{ steps.image.outputs.base }}/client:${{ github.sha }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client
