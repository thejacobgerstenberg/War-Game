# =============================================================================
# IMPERIUM client — nginx site config (installed to /etc/nginx/conf.d/default.conf)
#
# Serves the Vite SPA and reverse-proxies socket.io (WebSocket-aware) and the
# health endpoint to the game server, keeping everything same-origin for the
# browser.
# =============================================================================

# Upstream host "server" is the docker-compose service name (deploy/docker-compose.yml).
# Platform deploys (Fly/Railway/K8s/etc.) replace this host with their internal
# service address for the game server. Port 8080 matches the canonical PORT default.
upstream game_server {
    server server:8080;
}

server {
    # 8080, not 80: the image is nginxinc/nginx-unprivileged (non-root nginx
    # can't bind ports <1024). Keep in sync with EXPOSE in Dockerfile.client
    # and the port mapping in docker-compose.yml. (The game server also uses
    # 8080 — no clash, different containers.)
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- conservative security headers (SPA responses) ------------------------
    # Set at server level so every location inherits them — EXCEPT locations
    # that declare their own add_header (nginx add_header inheritance is
    # all-or-nothing), which must repeat them; see /assets/ and /index.html.
    # They are also inherited by the /socket.io/ and /healthz proxy locations,
    # where they are harmless (none of these affect WS upgrade or polling).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Starter CSP, deliberately ENABLED. connect-src allows same-origin http(s)
    # plus ws:/wss: for the socket.io WebSocket upgrade; style-src allows
    # inline styles (typical for Vite/React apps); img-src allows data: URIs.
    # TODO(scaffold): re-verify this policy against the final client bundle
    # (fonts? external images? workers?) before shipping — tighten or extend
    # rather than deleting it.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data:" always;

    # --- gzip for text assets -------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        application/wasm;

    # --- immutable hashed assets: cache 1 year --------------------------------
    # Vite emits content-hashed files under /assets/ by default.
    # TODO(scaffold): assumes Vite's default build.assetsDir "assets" — no vite.config.* exists yet; adjust if the scaffold changes it.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Repeat the server-level security headers: this block's own add_header
        # suppresses inheritance of ALL parent add_header directives.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data:" always;
        access_log off;
        try_files $uri =404;
    }

    # --- index.html: never cache (it references the hashed assets) ------------
    location = /index.html {
        add_header Cache-Control "no-cache";
        # Repeat the server-level security headers (same inheritance caveat).
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; style-src 'self' 'unsafe-inline'; img-src 'self' data:" always;
    }

    # --- socket.io: WS-aware reverse proxy to the game server -----------------
    # Default socket.io path per the canonical contract; same HTTP port as Express.
    location /socket.io/ {
        proxy_pass http://game_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived game sockets: keep well above socket.io's ping interval.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Don't buffer the polling-transport fallback.
        proxy_buffering off;
    }

    # --- health endpoint proxied to the server (canonical GET /healthz) -------
    location = /healthz {
        proxy_pass http://game_server/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        access_log off;
    }

    # --- SPA fallback ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
