name: Balance Regression

on:
  workflow_dispatch: {}
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC

permissions:
  contents: read

jobs:
  balance:
    runs-on: ubuntu-latest
    # sim:full ~3 min (sim/README.md) + sim:regression ~2.5 min on 4 cores
    # (~6 min single-threaded worst case) + npm test ~1 s + sim:report seconds;
    # 25 min gives >2x headroom over the whole job (checkout + npm ci included).
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check sim present
        id: guard
        run: |
          if [ -d sim ] && [ -f sim/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.present == 'true'
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Install sim deps
        if: steps.guard.outputs.present == 'true'
        run: |
          cd sim
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # sim/package.json defines: test (54 unit assertions, ~1 s), sim:full
      # (all five sims at full scale, ~3 min), sim:regression (deterministic
      # 21-check adversarial gate, ~2.5 min on 4 cores), and sim:report
      # (read-only summary of results/). Invoked without --if-present on
      # purpose: a script rename should fail this job loudly, not skip silently.
      - name: Run full balance suite
        if: steps.guard.outputs.present == 'true'
        run: |
          cd sim
          npm test
          npm run sim:full
          npm run sim:regression
          npm run sim:report

      - name: Collect report artifacts
        if: steps.guard.outputs.present == 'true'
        run: |
          mkdir -p balance-artifacts
          {
            echo "Balance Regression run"
            echo "Timestamp (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Ref: ${GITHUB_REF:-unknown}"
            echo "SHA: ${GITHUB_SHA:-unknown}"
            echo "Run ID: ${GITHUB_RUN_ID:-unknown}"
          } > balance-artifacts/README.txt

          # Tuning report (committed deliverable at sim/TUNING_REPORT.md)
          if [ -f sim/TUNING_REPORT.md ]; then
            cp sim/TUNING_REPORT.md balance-artifacts/ || true
          fi

          # Each sim writes results/<name>.json under sim/ (see sim/README.md)
          if [ -d sim/results ]; then
            find sim/results -type f \( -name '*.json' -o -name '*.csv' \) -print0 2>/dev/null \
              | xargs -0 -I{} cp --parents {} balance-artifacts/ 2>/dev/null || true
          fi

      - name: Upload artifact
        if: always() && steps.guard.outputs.present == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: balance-report
          path: balance-artifacts/
          if-no-files-found: warn
