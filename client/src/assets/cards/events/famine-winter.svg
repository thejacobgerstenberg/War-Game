<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>famine winter</title>

  <!-- parchment sky -->
  <rect x="0" y="0" width="260" height="160" fill="#F0E6D2"/>

  <!-- falling snow: flat vellum diamonds -->
  <polygon points="46,21 51,26 46,31 41,26" fill="#E2D3B3"/>
  <polygon points="90,7 95,12 90,17 85,12" fill="#E2D3B3"/>
  <polygon points="170,5 175,10 170,15 165,10" fill="#E2D3B3"/>
  <polygon points="224,27 229,32 224,37 219,32" fill="#E2D3B3"/>
  <polygon points="244,59 249,64 244,69 239,64" fill="#E2D3B3"/>
  <polygon points="12,39 17,44 12,49 7,44" fill="#E2D3B3"/>

  <!-- bare winter tree -->
  <path fill="#2B2118" d="M27,138 L27,100 L14,86 L17,83 L28,95 L28,78 L20,66 L23,64 L31,74 L33,60 L37,61 L35,78 L47,70 L49,73 L35,92 L35,138 Z"/>

  <!-- granary body -->
  <rect x="76" y="74" width="108" height="70" fill="#7A1F2B"/>

  <!-- roof -->
  <polygon points="62,78 130,26 198,78" fill="#2B2118"/>
  <!-- snow blanket on roof -->
  <polygon points="62,78 130,26 198,78 188,78 130,40 72,78" fill="#E2D3B3"/>

  <!-- gaping empty doorway -->
  <path fill="#2B2118" d="M112,144 L112,102 Q130,86 148,102 L148,144 Z"/>

  <!-- crow hunched on the ridge -->
  <path fill="#2B2118" d="M118,22 L128,17 Q132,10 140,11 Q150,12 152,18 L160,14 L154,22 Q148,27 138,26 L122,25 Z"/>

  <!-- snow ground drifts -->
  <path fill="#E2D3B3" d="M0,138 Q40,126 80,136 Q130,148 180,132 Q220,124 260,134 L260,160 L0,160 Z"/>

  <!-- empty grain sack, slumped -->
  <path fill="#C9A227" d="M160,140 Q156,124 166,114 Q176,106 186,112 Q194,117 192,126 L196,138 Q180,144 160,140 Z"/>
  <!-- dark open mouth of the sack -->
  <ellipse cx="192" cy="130" rx="4" ry="7" fill="#2B2118"/>

  <!-- last scattered grains -->
  <circle cx="204" cy="138" r="2.5" fill="#C9A227"/>
  <circle cx="211" cy="142" r="2.5" fill="#C9A227"/>
  <circle cx="198" cy="145" r="2.5" fill="#C9A227"/>
  <circle cx="140" cy="141" r="2.5" fill="#C9A227"/>
  <circle cx="149" cy="145" r="2.5" fill="#C9A227"/>
</svg>
