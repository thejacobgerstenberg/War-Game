<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160">
  <title>Omen in the Sky</title>

  <!-- vellum ground -->
  <rect width="260" height="160" fill="#E2D3B3"/>

  <!-- omen stars -->
  <g fill="#2B2118">
    <polygon points="40,23 42.5,27.5 47,30 42.5,32.5 40,37 37.5,32.5 33,30 37.5,27.5"/>
    <polygon points="72,9 74,13 78,15 74,17 72,21 70,17 66,15 70,13"/>
    <polygon points="120,20 122,24 126,26 122,28 120,32 118,28 114,26 118,24"/>
    <polygon points="228,69 230.5,73.5 235,76 230.5,78.5 228,83 225.5,78.5 221,76 225.5,73.5"/>
  </g>

  <!-- eclipsed moon: ink rim, gold sliver, crimson umbra -->
  <circle cx="175" cy="42" r="28" fill="#2B2118"/>
  <circle cx="175" cy="42" r="25" fill="#C9A227"/>
  <circle cx="180" cy="39" r="22" fill="#7A1F2B"/>

  <!-- strange light playing about the dome -->
  <polygon fill="#C9A227" points="66,100 68,74 75,92 83,64 90,88 95,60 100,88 107,64 115,92 122,74 124,100"/>

  <!-- Hagia Sophia silhouette -->
  <g fill="#2B2118">
    <path d="M 63 110 A 32 32 0 0 1 127 110 Z"/>
    <rect x="93" y="52" width="4" height="28"/>
    <rect x="86" y="58" width="18" height="4"/>
    <rect x="55" y="108" width="80" height="38"/>
    <path d="M 37 124 A 18 18 0 0 1 73 124 Z"/>
    <path d="M 117 124 A 18 18 0 0 1 153 124 Z"/>
    <rect x="30" y="124" width="34" height="22"/>
    <rect x="126" y="124" width="34" height="22"/>
    <rect x="0" y="132" width="32" height="14"/>
    <rect x="2" y="124" width="6" height="8"/>
    <rect x="14" y="124" width="6" height="8"/>
    <rect x="26" y="124" width="6" height="8"/>
  </g>

  <!-- the people, reading the heavens -->
  <g fill="#2B2118">
    <g transform="translate(192,146)">
      <polygon points="-7,0 7,0 2,-16 -2,-16"/>
      <circle cx="0" cy="-21" r="5"/>
      <polygon points="-3,-14 -11,-26 -8,-29 -1,-16"/>
      <polygon points="3,-14 11,-26 8,-29 1,-16"/>
    </g>
    <g transform="translate(215,146) scale(0.85)">
      <polygon points="-7,0 7,0 2,-16 -2,-16"/>
      <circle cx="0" cy="-21" r="5"/>
      <polygon points="-3,-14 -11,-26 -8,-29 -1,-16"/>
      <polygon points="3,-14 11,-26 8,-29 1,-16"/>
    </g>
    <g transform="translate(237,146) scale(1.05)">
      <polygon points="-7,0 7,0 2,-16 -2,-16"/>
      <circle cx="0" cy="-21" r="5"/>
      <polygon points="-3,-14 -11,-26 -8,-29 -1,-16"/>
      <polygon points="3,-14 11,-26 8,-29 1,-16"/>
    </g>
  </g>

  <!-- earth line -->
  <rect x="0" y="146" width="260" height="14" fill="#2B2118"/>
</svg>
